<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Spring&Summer Trend Issue By BLANCO</title>
    
    <meta property="og:title" content="2026 Spring&Summer Trend Issue By BLANCO">
    <meta property="og:description" content="最新のトレンド情報をチェック">
    <meta property="og:image" content="https://micchaku.github.io/2026ss_trend_issue/trend_thumbnail.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; }
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000;
        }
        .swiper-slide img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            user-select: none;
        }
        /* ページ番号表示 */
        .page-num { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8); 
            font-size: 12px; 
            z-index: 10; 
            background: rgba(0,0,0,0.4); 
            padding: 4px 12px; 
            border-radius: 20px;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiper-wrapper">
            </div>
    </div>
    <div class="page-num" id="page-num">1 / 29</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const totalPages = 29;
        const wrapper = document.getElementById('swiper-wrapper');

        // page01.png 〜 page29.png を自動でスライドに追加
        for (let i = 1; i <= totalPages; i++) {
            const fileName = 'page' + String(i).padStart(2, '0') + '.png';
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.innerHTML = `<img src="./${fileName}" loading="lazy">`;
            wrapper.appendChild(slide);
        }

        // Swiperの初期化
        const swiper = new Swiper('.swiper', {
            loop: false,
            grabCursor: true,
            resistanceRatio: 0.5,
            on: {
                slideChange: function () {
                    document.getElementById('page-num').innerText = (this.activeIndex + 1) + ' / ' + totalPages;
                },
            },
        });
    </script>
</body>
</html>
