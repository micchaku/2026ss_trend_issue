<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Spring&Summer Trend Issue By BLANCO</title>
    
    <meta property="og:title" content="2026 Spring&Summer Trend Issue By BLANCO">
    <meta property="og:description" content="最新のトレンド情報をチェック">
    <meta property="og:image" content="https://micchaku.github.io/2026ss_trend_issue/trend_thumbnail.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
        
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000;
        }
        .swiper-slide img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }

        /* 表紙スライドの特別な設定 */
        .cover-slide { 
            background: #fff !important; 
            flex-direction: column;
        }
        
        /* サムネイルを小さくし、エフェクトをかける */
        .cover-slide img { 
            width: 60%; /* サイズをさらに小さく（80%→60%） */
            max-width: 300px; 
            height: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); /* 柔らかい影 */
            border-radius: 2px;
            animation: floating 3s ease-in-out infinite; /* 浮遊エフェクト */
        }

        /* 浮遊アニメーション */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* スワイプガイド */
        .swipe-guide {
            position: absolute;
            bottom: 12%;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            font-size: 10px;
            letter-spacing: 0.2em;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .arrow-icon {
            margin-top: 10px; width: 12px; height: 12px;
            border-right: 1px solid #999; border-bottom: 1px solid #999;
            transform: rotate(-45deg);
            animation: arrow-move 1.5s infinite;
        }
        @keyframes arrow-move {
            0% { transform: rotate(-45deg) translate(0, 0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: rotate(-45deg) translate(8px, 8px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiper-wrapper">
            <div class="swiper-slide cover-slide">
                <img src="./trend_thumbnail.png">
                <div class="swipe-guide" id="guide">
                    <span>SWIPE TO READ</span>
                    <div class="arrow-icon"></div>
                </div>
            </div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const totalPages = 29;
        const wrapper = document.getElementById('swiper-wrapper');

        for (let i = 1; i <= totalPages; i++) {
            const fileName = 'page' + String(i).padStart(2, '0') + '.png';
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.innerHTML = `<img src="./${fileName}" loading="lazy">`;
            wrapper.appendChild(slide);
        }

        const swiper = new Swiper('.swiper', {
            loop: false,
            grabCursor: true,
            on: {
                slideChange: function () {
                    const guide = document.getElementById('guide');
                    if (this.activeIndex === 0) {
                        guide.style.opacity = "1";
                    } else {
                        guide.style.opacity = "0";
                    }
                },
            },
        });
    </script>
</body>
</html>
